<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dead Cap Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --primary:#0A0A0A;--accent:#C8102E;--accent-light:#FFF0F2;--surface:#FFFFFF;
    --surface-2:#F5F4F0;--surface-3:#EDECEA;--ink:#0A0A0A;--ink-secondary:#5A5A5A;
    --ink-muted:#9A9A9A;--border:rgba(0,0,0,0.10);--border-strong:rgba(0,0,0,0.22);
    --success:#1A7A4A;--info:#1E5FA8;--warning:#A06B00;
    --font-display:'Bebas Neue',sans-serif;--font-body:'DM Sans',sans-serif;--font-mono:'DM Mono',monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:var(--font-body);background:var(--surface-2);color:var(--ink);min-height:100vh;}

  .masthead{background:var(--primary);padding:20px 24px 18px;display:flex;align-items:flex-end;justify-content:space-between;border-bottom:3px solid var(--accent);}
  .masthead-wordmark{font-family:var(--font-display);font-size:32px;color:#fff;letter-spacing:1.5px;line-height:1;}
  .masthead-wordmark span{color:var(--accent);}
  .masthead-sub{font-family:var(--font-mono);font-size:10px;color:rgba(255,255,255,0.45);letter-spacing:2px;padding-bottom:3px;}

  .controls{display:flex;justify-content:flex-start;gap:8px;padding:14px 24px;background:var(--surface);border-bottom:1px solid var(--border);}
  .controls button{font-family:var(--font-mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:7px 16px;border:1px solid var(--border-strong);background:var(--surface);color:var(--ink-secondary);border-radius:3px;cursor:pointer;transition:all .15s;}
  .controls button:hover{background:var(--primary);color:#fff;border-color:var(--primary);}

  .loading{display:flex;flex-direction:column;align-items:center;padding:80px 20px;gap:14px;}
  .spinner{width:32px;height:32px;border:3px solid var(--surface-3);border-top:3px solid var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading p{font-family:var(--font-mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--ink-muted);}

  .table-wrapper{overflow-x:auto;padding:0 0 40px;}
  table{border-collapse:collapse;width:100%;}
  thead th:first-child,tbody td:first-child{position:sticky;left:0;z-index:10;}
  thead th:first-child{z-index:25;}
  thead th{position:sticky;top:0;z-index:15;background:var(--primary);font-family:var(--font-mono);font-weight:500;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.55);padding:13px 14px 11px;text-align:right;white-space:nowrap;border-bottom:2px solid var(--accent);user-select:none;cursor:pointer;transition:color .15s;}
  thead th:hover{color:#fff;}
  thead th:first-child{text-align:left;padding-left:20px;min-width:240px;background:var(--primary);}
  thead th .sort-arrow{font-size:8px;margin-left:3px;opacity:.3;}
  thead th.sort-active{color:#fff;}
  thead th.sort-active .sort-arrow{opacity:1;color:var(--accent);}
  thead th.total-col{color:#fff;border-left:2px solid rgba(255,255,255,0.15);}
  td.total-cell{border-left:2px solid rgba(0,0,0,0.12);font-weight:700!important;}

  tbody tr.team-row{border-bottom:1px solid var(--border);background:var(--surface);cursor:pointer;transition:background .1s;}
  tbody tr.team-row:hover{background:var(--surface-2);}
  tbody tr.team-row td{padding:13px 14px;text-align:right;font-family:var(--font-mono);font-size:13px;font-weight:600;white-space:nowrap;}
  tbody tr.team-row td:first-child{font-family:var(--font-body);font-weight:600;font-size:13px;letter-spacing:.3px;color:var(--ink);text-align:left;padding-left:20px;background:inherit;}
  tbody tr.team-row:hover td:first-child{background:var(--surface-2);}

  .team-name-cell{display:flex;align-items:center;gap:8px;}
  .team-logo{width:22px;height:22px;object-fit:contain;flex-shrink:0;}
  .caret{display:inline-block;font-size:8px;color:var(--ink-muted);transition:transform .2s,color .15s;flex-shrink:0;}
  tr.team-row.expanded .caret{transform:rotate(90deg);color:var(--accent);}
  tr.team-row.expanded td:first-child{color:var(--accent);}

  tbody tr.player-row{display:none;border-bottom:1px solid rgba(0,0,0,0.05);background:var(--surface-2);transition:background .1s;}
  tbody tr.player-row.show{display:table-row;}
  tbody tr.player-row:hover{background:var(--surface-3);}
  tbody tr.player-row td{padding:8px 14px;text-align:right;font-family:var(--font-mono);font-size:12px;font-weight:400;white-space:nowrap;color:var(--ink-secondary);}
  tbody tr.player-row td:first-child{font-family:var(--font-body);font-weight:400;font-size:12px;color:var(--ink-muted);text-align:left;padding-left:48px;background:inherit;}
  tbody tr.player-row:hover td:first-child{background:var(--surface-3);}

  .amt-high{color:var(--accent);}.amt-mid{color:var(--warning);}.amt-low{color:var(--info);}.amt-zero{color:var(--ink-muted);}

  @media(max-width:768px){.masthead-wordmark{font-size:22px;}.table-wrapper{padding:0 0 20px;}thead th:first-child,tbody td:first-child{min-width:160px;}}
  ::-webkit-scrollbar{width:6px;height:6px;}::-webkit-scrollbar-track{background:var(--surface-2);}::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:3px;}
</style>
</head>
<body>

<div class="masthead">
  <div class="masthead-wordmark">DEAD CAP <span>TRACKER</span></div>
  <div class="masthead-sub">Live from Google Sheets</div>
</div>

<div class="controls">
  <button onclick="collapseAll()">By Team</button>
  <button onclick="expandAll()">By Team and Player</button>
</div>

<div id="app">
  <div class="loading"><div class="spinner"></div><p>Loading&hellip;</p></div>
</div>

<script>
const CSV_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vRTwTOS_rNBYI8d8zDUivGFWXsXcxlOZgrqn5o-WCvFC5aNAR3vLsSqllE7aO0BRw/pub?gid=829871333&single=true&output=csv';
const nbaIds={ATL:1610612737,BOS:1610612738,BKN:1610612751,CHO:1610612766,CHI:1610612741,CLE:1610612739,DAL:1610612742,DEN:1610612743,DET:1610612765,GSW:1610612744,HOU:1610612745,IND:1610612754,LAC:1610612746,LAL:1610612747,MEM:1610612763,MIA:1610612748,MIL:1610612749,MIN:1610612750,NOP:1610612740,NYK:1610612752,OKC:1610612760,ORL:1610612753,PHI:1610612755,PHX:1610612756,POR:1610612757,SAC:1610612758,SAS:1610612759,TOR:1610612761,UTA:1610612762,WAS:1610612764};
const teamAbbrMap={'Atlanta Hawks':'ATL','Boston Celtics':'BOS','Brooklyn Nets':'BKN','Charlotte Hornets':'CHO','Chicago Bulls':'CHI','Cleveland Cavaliers':'CLE','Dallas Mavericks':'DAL','Denver Nuggets':'DEN','Detroit Pistons':'DET','Golden State Warriors':'GSW','Houston Rockets':'HOU','Indiana Pacers':'IND','LA Clippers':'LAC','Los Angeles Clippers':'LAC','LA Lakers':'LAL','Los Angeles Lakers':'LAL','Memphis Grizzlies':'MEM','Miami Heat':'MIA','Milwaukee Bucks':'MIL','Minnesota Timberwolves':'MIN','New Orleans Pelicans':'NOP','New York Knicks':'NYK','Oklahoma City Thunder':'OKC','Orlando Magic':'ORL','Philadelphia 76ers':'PHI','Phoenix Suns':'PHX','Portland Trail Blazers':'POR','Sacramento Kings':'SAC','San Antonio Spurs':'SAS','Toronto Raptors':'TOR','Utah Jazz':'UTA','Washington Wizards':'WAS'};
function logoUrl(team){const code=teamAbbrMap[team];const id=nbaIds[code];return id?`https://cdn.nba.com/logos/nba/${id}/primary/L/logo.svg`:'';}

const FALLBACK_B64=`VGVhbSxQbGF5ZXIsRGVhZCBDYXAgSGl0IDIwMjUtMjAyNixEZWFkIENhcCBIaXQgMjAyNi0yMDI3LERlYWQgQ2FwIEhpdCAyMDI3LTIwMjgsRGVhZCBDYXAgSGl0IDIwMjgtMjAyOSxEZWFkIENhcCBIaXQgMjAyOS0yMDMwCkF0bGFudGEgSGF3a3MsRHVvcCBSZWF0aCwkMjIxNjc3LCwsLAo=`;

let rows=[],teamTotals={},years=[],sortedTeams=[],expandedSet=new Set();
function escKey(s){return s.replace(/[^a-z0-9]/gi,'_');}
function parseMoney(s){if(!s||s.trim()===''||s.trim()==='-'||s.trim()==='$ -'||s.trim()==='$   -')return 0;let c=s.replace(/[$,"\s]/g,'');if(c.startsWith('(')&&c.endsWith(')'))c='-'+c.slice(1,-1);const n=parseFloat(c);return isNaN(n)?0:n;}
function formatMoney(n){if(n===0)return'â€”';return'$'+Math.abs(n).toLocaleString('en-US',{maximumFractionDigits:0});}
function amtClass(n){if(n===0)return'amt-zero';if(n>=15000000)return'amt-high';if(n>=5000000)return'amt-mid';return'amt-low';}

function parseData(csv){
  const lines=csv.trim().split('\n');
  const header=lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,''));
  years=header.slice(2).filter(Boolean);
  rows=[];
  for(let i=1;i<lines.length;i++){
    const vals=[];let cur='',inQ=false;
    for(const ch of lines[i]){if(ch==='"')inQ=!inQ;else if(ch===','&&!inQ){vals.push(cur);cur='';}else cur+=ch;}
    vals.push(cur);
    if(vals.length<2||!vals[0].trim())continue;
    const team=vals[0].trim(),player=vals[1].trim();
    if(!team||!player)continue;
    const amounts=years.map((_,j)=>parseMoney(vals[j+2]||''));
    rows.push({team,player,amounts});
  }
  teamTotals={};
  rows.forEach(r=>{
    if(!teamTotals[r.team])teamTotals[r.team]={totals:years.map(()=>0)};
    r.amounts.forEach((a,i)=>teamTotals[r.team].totals[i]+=a);
  });
  sortedTeams=Object.keys(teamTotals).sort();
}

function render(){
  const yearCols=years.map((y,i)=>`<th class="year-col" onclick="sortByYear(${i})">${y}<span class="sort-arrow">â‡…</span></th>`).join('');
  let html=`<div class="table-wrapper"><table><thead><tr>
    <th onclick="sortByName()" style="text-align:left">Team<span class="sort-arrow">â‡…</span></th>
    ${yearCols}
    <th class="total-col" onclick="sortByTotal()">Total<span class="sort-arrow">â‡…</span></th>
  </tr></thead><tbody>`;

  sortedTeams.forEach(team=>{
    const key=escKey(team);
    const tot=teamTotals[team];
    const grand=tot.totals.reduce((a,b)=>a+b,0);
    const logo=logoUrl(team);
    const yearCells=tot.totals.map((a,i)=>`<td class="${amtClass(a/years.length)}">${formatMoney(a)}</td>`).join('');
    html+=`<tr class="team-row" data-team="${key}" onclick="toggleTeam('${key}')">
      <td><div class="team-name-cell">
        <span class="caret">â–¶</span>
        ${logo?`<img src="${logo}" alt="${team}" class="team-logo">`:''}
        ${team}
      </div></td>
      ${yearCells}
      <td class="total-cell ${amtClass(grand/5)}">${formatMoney(grand)}</td>
    </tr>`;
    rows.filter(r=>r.team===team).forEach(r=>{
      const pg=r.amounts.reduce((a,b)=>a+b,0);
      const pYearCells=r.amounts.map(a=>`<td class="${amtClass(a)}">${formatMoney(a)}</td>`).join('');
      html+=`<tr class="player-row" data-team="${key}"><td>${r.player}</td>${pYearCells}<td class="total-cell ${amtClass(pg/5)}">${formatMoney(pg)}</td></tr>`;
    });
  });
  html+='</tbody></table></div>';
  document.getElementById('app').innerHTML=html;
  updateVisibility();
}

function toggleTeam(key){expandedSet.has(key)?expandedSet.delete(key):expandedSet.add(key);updateVisibility();}
function expandAll(){sortedTeams.forEach(t=>expandedSet.add(escKey(t)));updateVisibility();}
function collapseAll(){expandedSet.clear();updateVisibility();}
function updateVisibility(){
  document.querySelectorAll('tr.player-row').forEach(el=>el.classList.toggle('show',expandedSet.has(el.dataset.team)));
  document.querySelectorAll('tr.team-row').forEach(tr=>tr.classList.toggle('expanded',expandedSet.has(tr.dataset.team)));
}
function sortByName(){sortedTeams.sort((a,b)=>a.localeCompare(b));render();}
function sortByYear(i){sortedTeams.sort((a,b)=>teamTotals[b].totals[i]-teamTotals[a].totals[i]);render();}
function sortByTotal(){sortedTeams.sort((a,b)=>teamTotals[b].totals.reduce((s,v)=>s+v,0)-teamTotals[a].totals.reduce((s,v)=>s+v,0));render();}

async function init(){
  try{
    const resp=await fetch(CSV_URL);
    if(!resp.ok)throw new Error();
    parseData(await resp.text());render();
  }catch(e){
    try{parseData(atob(FALLBACK_B64));render();}catch(e2){document.getElementById('app').innerHTML='<div style="text-align:center;padding:80px;color:var(--accent)">Failed to load data.</div>';}
  }
}
init();
</script>
</body>
</html>
